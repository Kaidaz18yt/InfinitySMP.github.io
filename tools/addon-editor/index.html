<!doctype html>
<html lang="en">
    <head>
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://infinitysmp.github.io/" />
        <meta property="og:title" content="Infinity | Addon Editor" />
        <meta property="og:description" content="Edit the image, name, description and authors of a .mcaddon or .mcpack!" />
        <meta property="og:image" content="https://infinitysmp.github.io/addon.png" />
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Infinity | Addon Editor</title>
        <link rel="icon" type="image/png" href="https://infinitysmp.github.io/logo.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            html { overflow-x: hidden; overflow-y: auto; }
            body { overflow-x: hidden; }
            body::-webkit-scrollbar, html::-webkit-scrollbar { display: none; }
            body, html { -ms-overflow-style: none; scrollbar-width: none; }

            :root {
                --bg-primary: #0a1929;
                --bg-secondary: #0d2137;
                --bg-tertiary: #132f4c;
                --bg-quaternary: #0f1e30;
                --text-primary: #e3f2fd;
                --text-secondary: #90caf9;
                --text-tertiary: #64b5f6;
                --accent: #2196f3;
                --accent-hover: #42a5f5;
                --accent-dark: #1976d2;
                --accent-subtle: rgba(33, 150, 243, 0.08);
                --border: rgba(33, 150, 243, 0.15);
                --border-hover: rgba(33, 150, 243, 0.3);
                --shadow-sm: 0 2px 8px rgba(33, 150, 243, 0.1);
                --shadow-md: 0 4px 20px rgba(33, 150, 243, 0.15);
                --shadow-lg: 0 12px 48px rgba(33, 150, 243, 0.25);
                --shadow-glow: 0 0 40px rgba(33, 150, 243, 0.2);
                --radius-sm: 10px;
                --radius-md: 14px;
                --radius-lg: 20px;
                --warn: #ff9800;
                --warn-subtle: rgba(255, 152, 0, 0.08);
                --warn-border: rgba(255, 152, 0, 0.25);
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
                background: var(--bg-primary);
                color: var(--text-primary);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 40px 20px;
                line-height: 1.5;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                position: relative;
                width: 100%;
                max-width: 100vw;
            }

            body::before {
                content: "";
                position: fixed;
                top: -50%; left: -50%;
                width: 200%; height: 200%;
                background: radial-gradient(circle at 30% 50%, rgba(33,150,243,0.1) 0%, transparent 50%),
                            radial-gradient(circle at 70% 50%, rgba(33,150,243,0.05) 0%, transparent 50%);
                animation: float 20s ease-in-out infinite;
                pointer-events: none;
            }

            @keyframes float {
                0%, 100% { transform: translate(0,0) rotate(0deg); }
                33% { transform: translate(30px,-30px) rotate(5deg); }
                66% { transform: translate(-20px,20px) rotate(-5deg); }
            }

            .container {
                width: 100%;
                max-width: 800px;
                animation: fadeInUp 0.8s cubic-bezier(0.16,1,0.3,1);
                position: relative;
                z-index: 1;
            }

            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(30px); }
                to { opacity: 1; transform: translateY(0); }
            }

            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }

            .header { text-align: center; margin-bottom: 48px; }

            .logo-container { margin-bottom: 32px; animation: fadeIn 0.6s ease-out; }

            .logo {
                width: 96px; height: 96px;
                margin: 0 auto;
                border-radius: 24px;
                display: flex; align-items: center; justify-content: center;
                overflow: hidden;
                box-shadow: var(--shadow-glow), var(--shadow-lg);
                background: var(--bg-secondary);
                border: 2px solid var(--border);
                transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
                cursor: pointer;
            }
            .logo:hover {
                transform: scale(1.05) translateY(-5px);
                box-shadow: 0 0 60px rgba(33,150,243,0.4), var(--shadow-lg);
                border-color: var(--accent);
            }
            .logo img { width: 100%; height: 100%; object-fit: cover; }

            h1 {
                font-size: 48px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 16px;
                background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
                -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
                animation: fadeIn 0.6s ease-out 0.2s backwards;
            }

            .subtitle {
                font-size: 18px; color: var(--text-secondary); font-weight: 400;
                max-width: 600px; margin: 0 auto; line-height: 1.6;
                animation: fadeIn 0.6s ease-out 0.3s backwards;
            }

            /* ── Cards ── */
            .editor-card {
                background: var(--bg-secondary);
                border-radius: var(--radius-lg);
                padding: 40px;
                box-shadow: var(--shadow-md);
                border: 1px solid var(--border);
                animation: fadeInUp 0.6s ease-out 0.4s backwards;
                margin-bottom: 24px;
            }

            /* Hidden until pack is loaded */
            .editor-card.hidden { display: none; }

            .section-title {
                font-size: 13px;
                font-weight: 600;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: var(--text-tertiary);
                margin-bottom: 20px;
                padding-bottom: 12px;
                border-bottom: 1px solid var(--border);
            }

            /* ── Pack tabs (BP / RP for mcaddon) ── */
            .pack-tabs {
                display: flex;
                gap: 8px;
                margin-bottom: 24px;
            }
            .pack-tab {
                flex: 1;
                padding: 10px 16px;
                border-radius: var(--radius-sm);
                border: 1px solid var(--border);
                background: var(--bg-tertiary);
                color: var(--text-secondary);
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                transition: all 0.25s ease;
                text-align: center;
            }
            .pack-tab.active {
                background: var(--accent-subtle);
                border-color: var(--accent);
                color: var(--text-primary);
                box-shadow: 0 0 0 1px var(--accent);
            }
            .pack-tab:hover:not(.active) {
                border-color: var(--border-hover);
                color: var(--text-primary);
            }

            .pack-panel { display: none; }
            .pack-panel.active { display: block; }

            /* ── Form elements ── */
            .form-group { margin-bottom: 22px; }
            .form-group:last-of-type { margin-bottom: 28px; }

            label {
                display: block;
                font-size: 14px; font-weight: 500;
                color: var(--text-primary);
                margin-bottom: 8px;
                letter-spacing: -0.01em;
            }

            .label-hint {
                font-size: 12px;
                color: var(--text-tertiary);
                font-weight: 400;
                margin-left: 6px;
            }

            input[type="text"],
            input[type="file"],
            textarea {
                width: 100%;
                padding: 13px 15px;
                background: var(--bg-tertiary);
                border: 1px solid var(--border);
                border-radius: var(--radius-md);
                color: var(--text-primary);
                font-size: 14px;
                font-family: inherit;
                transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
                outline: none;
            }
            input[type="text"]:focus, textarea:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(33,150,243,0.1);
                background: var(--bg-secondary);
            }
            input[type="file"] { padding: 12px; cursor: pointer; }
            input[type="file"]::file-selector-button {
                padding: 9px 18px;
                background: var(--accent);
                color: white; border: none;
                border-radius: var(--radius-sm);
                font-weight: 500; cursor: pointer;
                transition: all 0.3s ease; margin-right: 12px;
            }
            input[type="file"]::file-selector-button:hover {
                background: var(--accent-hover);
                transform: translateY(-1px);
            }
            textarea { resize: vertical; min-height: 90px; line-height: 1.6; }

            /* ── UUID rows ── */
            .uuid-row {
                display: grid;
                grid-template-columns: 1fr auto;
                gap: 8px;
                align-items: center;
            }
            .uuid-row input { font-family: "SF Mono", "Fira Code", monospace; font-size: 13px; }

            .btn-regen {
                padding: 13px 14px;
                background: var(--bg-tertiary);
                border: 1px solid var(--border);
                border-radius: var(--radius-md);
                color: var(--text-secondary);
                font-size: 18px;
                cursor: pointer;
                transition: all 0.25s ease;
                line-height: 1;
                display: flex; align-items: center; justify-content: center;
                flex-shrink: 0;
                width: 46px; height: 46px;
            }
            .btn-regen:hover {
                background: var(--accent-subtle);
                border-color: var(--accent);
                color: var(--accent);
                transform: rotate(90deg);
            }

            /* ── Dependency UUIDs ── */
            .deps-list { display: flex; flex-direction: column; gap: 14px; }
            .dep-item {
                background: var(--bg-tertiary);
                border: 1px solid var(--border);
                border-radius: var(--radius-md);
                padding: 14px 16px;
            }
            .dep-label {
                font-size: 12px;
                color: var(--text-tertiary);
                margin-bottom: 8px;
                font-weight: 500;
            }
            .no-deps {
                font-size: 13px;
                color: var(--text-tertiary);
                font-style: italic;
                padding: 8px 0;
            }

            /* ── Success toast ── */
            .toast {
                position: fixed;
                bottom: 32px;
                left: 50%;
                transform: translateX(-50%) translateY(80px);
                background: var(--bg-tertiary);
                border: 1px solid var(--accent);
                color: var(--text-primary);
                padding: 14px 24px;
                border-radius: var(--radius-md);
                font-size: 14px;
                font-weight: 500;
                box-shadow: var(--shadow-lg);
                z-index: 9999;
                opacity: 0;
                transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
                pointer-events: none;
                white-space: nowrap;
            }
            .toast.show {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            .toast.error {
                border-color: #f44336;
                color: #ef9a9a;
            }

            /* ── Buttons ── */
            button.primary {
                width: 100%;
                padding: 16px 32px;
                background: linear-gradient(135deg, var(--accent), var(--accent-hover));
                color: white; border: none;
                border-radius: var(--radius-md);
                font-size: 16px; font-weight: 600;
                cursor: pointer;
                transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
                box-shadow: var(--shadow-md);
                letter-spacing: -0.01em;
            }
            button.primary:hover {
                transform: translateY(-2px);
                box-shadow: var(--shadow-lg), var(--shadow-glow);
            }
            button.primary:active { transform: translateY(0); }
            button.primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

            /* ── Warning badge ── */
            .warn-badge {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                font-size: 12px;
                color: var(--warn);
                background: var(--warn-subtle);
                border: 1px solid var(--warn-border);
                border-radius: 6px;
                padding: 4px 10px;
                margin-left: 8px;
                font-weight: 500;
            }

            /* ── Footer ── */
            .footer {
                text-align: center;
                margin-top: 48px; padding-top: 32px;
                border-top: 1px solid var(--border);
                animation: fadeIn 0.6s ease-out 0.5s backwards;
            }
            .footer-text { font-size: 14px; color: var(--text-tertiary); line-height: 1.6; }
            .footer-text a { color: var(--accent); text-decoration: none; transition: color 0.2s ease; }
            .footer-text a:hover { color: var(--accent-hover); text-decoration: underline; }

            /* ── Particles ── */
            .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
            .particle { position: absolute; width: 3px; height: 3px; background: var(--accent); border-radius: 50%; opacity: 0; animation: float-particle 15s infinite; box-shadow: 0 0 10px var(--accent); }
            @keyframes float-particle {
                0% { transform: translateY(100vh) translateX(0); opacity: 0; }
                10% { opacity: 0.5; }
                90% { opacity: 0.5; }
                100% { transform: translateY(-100px) translateX(100px); opacity: 0; }
            }
            .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
            .particle:nth-child(2) { left: 25%; animation-delay: 3s; }
            .particle:nth-child(3) { left: 40%; animation-delay: 6s; }
            .particle:nth-child(4) { left: 60%; animation-delay: 9s; }
            .particle:nth-child(5) { left: 75%; animation-delay: 12s; }
            .particle:nth-child(6) { left: 90%; animation-delay: 2s; }

            @media (max-width: 768px) {
                body { padding: 32px 16px; }
                h1 { font-size: 36px; }
                .subtitle { font-size: 16px; }
                .editor-card { padding: 24px; }
                .logo { width: 80px; height: 80px; }
            }
        </style>
    </head>
    <body>
        <div class="particles">
            <div class="particle"></div><div class="particle"></div>
            <div class="particle"></div><div class="particle"></div>
            <div class="particle"></div><div class="particle"></div>
        </div>

        <div class="toast" id="toast"></div>

        <div class="container">
            <div class="header">
                <div class="logo-container">
                    <a href="https://infinitysmp.github.io/tools" class="logo">
                        <img src="https://infinitysmp.github.io/addon.png" alt="Infinity SMP" />
                    </a>
                </div>
                <h1>Addon Editor</h1>
                <p class="subtitle">Edit the metadata and icon of your Minecraft .mcpack or .mcaddon files locally in your browser.</p>
            </div>

            <!-- File picker -->
            <div class="editor-card">
                <div class="section-title">Load Pack</div>
                <div class="form-group" style="margin-bottom:0">
                    <label for="filepicker">Select .mcpack / .mcaddon</label>
                    <input type="file" id="filepicker" accept=".mcpack,.mcaddon" />
                </div>
            </div>

            <!-- Per-pack metadata (tabs when mcaddon) — hidden until loaded -->
            <div class="editor-card hidden" id="metaCard">
                <div class="section-title">Pack Metadata</div>

                <!-- Tab bar (hidden for single-pack files) -->
                <div class="pack-tabs" id="packTabs" style="display:none"></div>

                <!-- Panels injected here by JS -->
                <div id="packPanels"></div>
            </div>

            <!-- Icon & Download — hidden until loaded -->
            <div class="editor-card hidden" id="saveCard">
                <div class="section-title">Icon &amp; Download</div>

                <div class="form-group">
                    <label for="iconpicker">Pack Icon PNG <span class="label-hint">(optional — updates all packs in .mcaddon)</span></label>
                    <input type="file" id="iconpicker" accept="image/png" />
                </div>

                <button class="primary" id="saveBtn">Save &amp; Download Updated Pack</button>
            </div>

            <div class="footer">
                <p class="footer-text">
                    Made with ❤️ for the Infinity SMP community •
                    <a href="https://infinitysmp.github.io/">Back to Home</a>
                </p>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
        <script>
        // ─────────────────────────────────────────────
        //  Toast helper (replaces alert())
        // ─────────────────────────────────────────────
        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast' + (isError ? ' error' : '');
            // Force reflow so transition fires
            void t.offsetWidth;
            t.classList.add('show');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.classList.remove('show'), 3000);
        }

        // ─────────────────────────────────────────────
        //  State
        // ─────────────────────────────────────────────
        let currentZip = null;
        let isMcaddon  = false;
        // Array of { label, manifestPath, manifest, subZipPath (null for .mcpack), subZip }
        let packs = [];

        // ─────────────────────────────────────────────
        //  UUID helpers
        // ─────────────────────────────────────────────
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0;
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
        }

        function escHtml(s) {
            return String(s ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function regenUUID(inputId) {
            document.getElementById(inputId).value = generateUUID();
        }

        // ─────────────────────────────────────────────
        //  Build UI for a single pack panel
        // ─────────────────────────────────────────────
        function buildPackPanel(pack, idx) {
            const m    = pack.manifest;
            const hd   = m.header   || {};
            const meta = m.metadata || {};

            const name    = hd.name        ?? '';
            const desc    = hd.description ?? '';

            // Authors can live in header.authors OR metadata.authors
            const rawAuthors = hd.authors ?? meta.authors ?? [];
            const authors = Array.isArray(rawAuthors) ? rawAuthors.join(', ') : String(rawAuthors);

            const url     = meta.url     ?? '';
            const license = meta.license ?? '';

            const headerUUID  = hd.uuid ?? '';
            const moduleUUIDs = (m.modules || []).map(mod => mod.uuid ?? '');

            // Dependencies — check both header.dependencies and top-level m.dependencies
            const deps = hd.dependencies ?? m.dependencies ?? [];

            // ── Dependency rows ──
            let depRowsHTML = '';
            if (!deps.length) {
                depRowsHTML = '<p class="no-deps">No dependencies found.</p>';
            } else {
                deps.forEach((dep, di) => {
                    const ver = Array.isArray(dep.version) ? dep.version.join('.') : (dep.version ?? '?');
                    depRowsHTML += `
                        <div class="dep-item">
                            <div class="dep-label">Dependency ${di + 1}${dep.description ? ' — ' + escHtml(dep.description) : ''} (v${ver})</div>
                            <div class="uuid-row">
                                <input type="text" id="dep-${idx}-${di}" value="${escHtml(dep.uuid ?? '')}" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
                                <button class="btn-regen" title="Regenerate UUID" onclick="regenUUID('dep-${idx}-${di}')">↻</button>
                            </div>
                        </div>`;
                });
            }

            // ── Module rows ──
            let modRowsHTML = '';
            if (!moduleUUIDs.length) {
                modRowsHTML = '<p class="no-deps">No modules found.</p>';
            } else {
                m.modules.forEach((mod, mi) => {
                    modRowsHTML += `
                        <div class="dep-item">
                            <div class="dep-label">Module ${mi + 1}${mod.type ? ' — ' + escHtml(mod.type) : ''}</div>
                            <div class="uuid-row">
                                <input type="text" id="mod-${idx}-${mi}" value="${escHtml(mod.uuid ?? '')}" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
                                <button class="btn-regen" title="Regenerate UUID" onclick="regenUUID('mod-${idx}-${mi}')">↻</button>
                            </div>
                        </div>`;
                });
            }

            // Build the panel HTML.
            // IMPORTANT: textarea content must NOT use innerHTML escaping the same way —
            // we set it via textContent after insertion to avoid double-encoding.
            const panelId = `panel-inner-${idx}`;
            return `
                <div id="${panelId}">
                    <div class="form-group">
                        <label>Pack Name</label>
                        <input type="text" id="name-${idx}" value="${escHtml(name)}" placeholder="Enter pack name…" />
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="desc-${idx}" rows="3" placeholder="Enter pack description…"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Authors <span class="label-hint">(comma separated)</span></label>
                        <input type="text" id="authors-${idx}" value="${escHtml(authors)}" placeholder="Author1, Author2…" />
                    </div>
                    <div class="form-group">
                        <label>Homepage URL <span class="label-hint">(optional)</span></label>
                        <input type="text" id="url-${idx}" value="${escHtml(url)}" placeholder="https://example.com" />
                    </div>
                    <div class="form-group">
                        <label>License URL <span class="label-hint">(optional)</span></label>
                        <input type="text" id="license-${idx}" value="${escHtml(license)}" placeholder="https://example.com/license" />
                    </div>

                    <div class="section-title" style="margin-top:8px">Pack UUID (header)</div>
                    <div class="form-group">
                        <label>Header UUID</label>
                        <div class="uuid-row">
                            <input type="text" id="huuid-${idx}" value="${escHtml(headerUUID)}" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
                            <button class="btn-regen" title="Regenerate UUID" onclick="regenUUID('huuid-${idx}')">↻</button>
                        </div>
                    </div>

                    <div class="section-title">Module UUIDs</div>
                    <div class="deps-list">${modRowsHTML}</div>

                    <div class="section-title" style="margin-top:20px">Dependency UUIDs</div>
                    <div class="deps-list">${depRowsHTML}</div>
                </div>`;
        }

        // ─────────────────────────────────────────────
        //  Tabs
        // ─────────────────────────────────────────────
        function switchTab(idx) {
            document.querySelectorAll('.pack-tab').forEach((t,i) => t.classList.toggle('active', i === idx));
            document.querySelectorAll('.pack-panel').forEach((p,i) => p.classList.toggle('active', i === idx));
        }

        // ─────────────────────────────────────────────
        //  Read manifest from a zip (returns { path, manifest } or null)
        // ─────────────────────────────────────────────
        async function readManifest(zip) {
            const files = Object.keys(zip.files);
            const path  = files.find(p => p.toLowerCase().endsWith('manifest.json') && !zip.files[p].dir);
            if (!path) return null;
            const text = await zip.file(path).async('string');
            try {
                return { path, manifest: JSON.parse(text) };
            } catch (e) {
                console.error('Failed to parse manifest at', path, e);
                return null;
            }
        }

        // ─────────────────────────────────────────────
        //  File picker — load pack
        // ─────────────────────────────────────────────
        document.getElementById('filepicker').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                const data = await file.arrayBuffer();
                currentZip = await JSZip.loadAsync(data);
                isMcaddon  = file.name.toLowerCase().endsWith('.mcaddon');
                packs      = [];

                if (isMcaddon) {
                    // Try zip-of-zips first
                    const innerFiles = Object.keys(currentZip.files).filter(p =>
                        (p.toLowerCase().endsWith('.mcpack') || p.toLowerCase().endsWith('.mcaddon'))
                        && !currentZip.files[p].dir
                    );

                    if (innerFiles.length > 0) {
                        for (const innerPath of innerFiles) {
                            const innerData = await currentZip.file(innerPath).async('arraybuffer');
                            const innerZip  = await JSZip.loadAsync(innerData);
                            const result    = await readManifest(innerZip);
                            if (result) {
                                const label = innerPath.split('/').pop().replace(/\.(mcpack|mcaddon)$/i, '');
                                packs.push({
                                    label,
                                    manifestPath: result.path,
                                    manifest: result.manifest,
                                    subZipPath: innerPath,
                                    subZip: innerZip
                                });
                            }
                        }
                    }

                    // Fallback: flat .mcaddon with multiple manifest.json files
                    if (packs.length === 0) {
                        const manifestPaths = Object.keys(currentZip.files)
                            .filter(p => p.toLowerCase().endsWith('manifest.json') && !currentZip.files[p].dir);

                        for (const mPath of manifestPaths) {
                            const text = await currentZip.file(mPath).async('string');
                            let manifest;
                            try { manifest = JSON.parse(text); } catch { continue; }
                            const parts = mPath.split('/');
                            const label = parts.length > 1 ? parts[0] : (manifest.header?.name || mPath);
                            packs.push({ label, manifestPath: mPath, manifest, subZipPath: null, subZip: null });
                        }
                    }
                } else {
                    // Single .mcpack
                    const result = await readManifest(currentZip);
                    if (!result) {
                        showToast('manifest.json not found in the pack.', true);
                        return;
                    }
                    packs.push({
                        label: 'Pack',
                        manifestPath: result.path,
                        manifest: result.manifest,
                        subZipPath: null,
                        subZip: null
                    });
                }

                if (packs.length === 0) {
                    showToast('No valid manifests found in the file.', true);
                    return;
                }

                renderPackUI();

                // Show the metadata and save cards
                document.getElementById('metaCard').classList.remove('hidden');
                document.getElementById('saveCard').classList.remove('hidden');

                showToast(`✓ Loaded ${packs.length} pack${packs.length > 1 ? 's' : ''} successfully`);
            } catch (err) {
                console.error(err);
                showToast('Error loading pack: ' + err.message, true);
            }
        });

        // ─────────────────────────────────────────────
        //  Render tabs + panels
        // ─────────────────────────────────────────────
        function renderPackUI() {
            const tabsEl   = document.getElementById('packTabs');
            const panelsEl = document.getElementById('packPanels');
            tabsEl.innerHTML   = '';
            panelsEl.innerHTML = '';

            if (packs.length > 1) {
                tabsEl.style.display = 'flex';
                packs.forEach((pack, i) => {
                    const tab = document.createElement('button');
                    tab.className   = 'pack-tab' + (i === 0 ? ' active' : '');
                    tab.textContent = pack.label;
                    tab.onclick     = () => switchTab(i);
                    tabsEl.appendChild(tab);
                });
            } else {
                tabsEl.style.display = 'none';
            }

            packs.forEach((pack, i) => {
                const panel = document.createElement('div');
                panel.className = 'pack-panel' + (i === 0 ? ' active' : '');
                panel.innerHTML = buildPackPanel(pack, i);
                panelsEl.appendChild(panel);

                // Set textarea value via textContent to avoid HTML double-encoding
                const desc = pack.manifest.header?.description ?? '';
                const ta = document.getElementById(`desc-${i}`);
                if (ta) ta.value = desc;
            });
        }

        // ─────────────────────────────────────────────
        //  Collect edits from UI back into manifest obj
        // ─────────────────────────────────────────────
        function collectPackEdits(idx) {
            const pack = packs[idx];
            const m    = pack.manifest;

            const name    = document.getElementById(`name-${idx}`).value;
            const desc    = document.getElementById(`desc-${idx}`).value;
            const authors = document.getElementById(`authors-${idx}`).value
                                .split(',').map(a => a.trim()).filter(Boolean);
            const url     = document.getElementById(`url-${idx}`).value.trim();
            const license = document.getElementById(`license-${idx}`).value.trim();
            const huuid   = document.getElementById(`huuid-${idx}`).value.trim();

            if (!m.header) m.header = {};
            m.header.name        = name;
            m.header.description = desc;
            m.header.uuid        = huuid;

            // Only write authors where the key already exists
            if ('authors' in m.header) m.header.authors = authors;

            if (!m.metadata) m.metadata = {};
            if ('authors' in m.metadata) m.metadata.authors = authors;
            if (url)     m.metadata.url     = url;     else delete m.metadata.url;
            if (license) m.metadata.license = license; else delete m.metadata.license;

            // Module UUIDs + description
            if (m.modules) {
                m.modules.forEach((mod, mi) => {
                    mod.description = desc;
                    const el = document.getElementById(`mod-${idx}-${mi}`);
                    if (el) mod.uuid = el.value.trim();
                });
            }

            // Dependency UUIDs
            const deps = m.header.dependencies ?? m.dependencies ?? [];
            deps.forEach((dep, di) => {
                const el = document.getElementById(`dep-${idx}-${di}`);
                if (el) dep.uuid = el.value.trim();
            });
        }

        // ─────────────────────────────────────────────
        //  Save & download
        // ─────────────────────────────────────────────
        document.getElementById('saveBtn').addEventListener('click', async () => {
            if (!currentZip || packs.length === 0) {
                showToast('Please load a pack first.', true);
                return;
            }

            try {
                packs.forEach((_, i) => collectPackEdits(i));

                const iconFile = document.getElementById('iconpicker').files[0];
                const iconData = iconFile ? await iconFile.arrayBuffer() : null;

                if (isMcaddon && packs[0].subZipPath) {
                    for (const pack of packs) {
                        pack.subZip.file(pack.manifestPath, JSON.stringify(pack.manifest, null, 2));
                        if (iconData) {
                            const iconPath = findOrCreateIconPath(pack.subZip, pack.manifestPath);
                            pack.subZip.file(iconPath, iconData);
                        }
                        const updatedInner = await pack.subZip.generateAsync({ type: 'arraybuffer' });
                        currentZip.file(pack.subZipPath, updatedInner);
                    }
                } else {
                    for (const pack of packs) {
                        currentZip.file(pack.manifestPath, JSON.stringify(pack.manifest, null, 2));
                        if (iconData) {
                            const iconPath = findOrCreateIconPath(currentZip, pack.manifestPath);
                            currentZip.file(iconPath, iconData);
                        }
                    }
                }

                const content = await currentZip.generateAsync({ type: 'blob' });

                const originalName = document.getElementById('filepicker').files[0].name;
                const baseName     = originalName.substring(0, originalName.lastIndexOf('.')) || 'edited_pack';
                const ext          = originalName.substring(originalName.lastIndexOf('.') + 1);

                const newName = prompt('Save file name (without extension)', baseName + '_edited');
                if (!newName) return;

                const link    = document.createElement('a');
                link.href     = URL.createObjectURL(content);
                link.download = newName + '.' + ext;
                link.click();

                showToast('✓ Pack saved and downloaded!');
            } catch (err) {
                console.error(err);
                showToast('Error saving pack: ' + err.message, true);
            }
        });

        // ─────────────────────────────────────────────
        //  Helper — find existing pack_icon.png path
        // ─────────────────────────────────────────────
        function findOrCreateIconPath(zip, manifestPath) {
            const existing = Object.keys(zip.files).find(p => p.toLowerCase().endsWith('pack_icon.png'));
            if (existing) return existing;
            const dir = manifestPath.substring(0, manifestPath.lastIndexOf('/') + 1);
            return dir + 'pack_icon.png';
        }
        </script>
    </body>
</html>
