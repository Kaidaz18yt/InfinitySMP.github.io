<!doctype html>
<html lang="en-AU">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Infinity | Event Opt-Out</title>
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://infinitysmp.github.io/opt-out/" />
        <meta property="og:site_name" content="Infinity SMP" />
        <meta property="og:title" content="Infinity SMP — Event Opt-Out" />
        <meta property="og:description" content="Opt out of an Infinity SMP event. Select an event, enter your Minecraft username and reason to submit." />
        <meta property="og:image" content="https://infinitysmp.github.io/recall-images/eventhunt.png" />
        <meta property="og:image:width" content="512" />
        <meta property="og:image:height" content="512" />
        <meta name="twitter:card" content="summary" />
        <meta name="twitter:title" content="Infinity SMP — Event Opt-Out" />
        <meta name="twitter:description" content="Opt out of an Infinity SMP event. Select an event, enter your Minecraft username and reason to submit." />
        <meta name="twitter:image" content="https://infinitysmp.github.io/recall-images/eventhunt.png" />
        <meta name="description" content="Opt out of an Infinity SMP event. Select an event, enter your Minecraft username and reason to submit." />
        <link rel="icon" type="image/png" href="https://infinitysmp.github.io/recall-images/logo.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
        <style>
            * { margin:0; padding:0; box-sizing:border-box; }
            html { overflow-x:hidden; overflow-y:auto; }
            body::-webkit-scrollbar, html::-webkit-scrollbar { display:none; }
            body, html { -ms-overflow-style:none; scrollbar-width:none; }

            :root {
                --bg-primary: #0a1929; --bg-secondary: #0d2137; --bg-tertiary: #132f4c;
                --text-primary: #e3f2fd; --text-secondary: #90caf9; --text-tertiary: #64b5f6;
                --accent: #2196f3; --accent-hover: #42a5f5;
                --border: rgba(33,150,243,0.15); --border-hover: rgba(33,150,243,0.3);
                --shadow-md: 0 4px 20px rgba(33,150,243,0.15);
                --shadow-lg: 0 12px 48px rgba(33,150,243,0.25);
                --shadow-glow: 0 0 40px rgba(33,150,243,0.2);
                --radius-sm: 10px; --radius-md: 14px; --radius-lg: 20px;
                --status-down: #f44336; --status-degraded: #ff9800;
                --green: #4caf50;
            }

            body { font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif; background:var(--bg-primary); color:var(--text-primary); min-height:100vh; padding:40px 20px; line-height:1.5; -webkit-font-smoothing:antialiased; position:relative; max-width:100vw; }
            body::before { content:""; position:fixed; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle at 30% 50%,rgba(33,150,243,0.1) 0%,transparent 50%),radial-gradient(circle at 70% 50%,rgba(33,150,243,0.05) 0%,transparent 50%); animation:floatBg 20s ease-in-out infinite; pointer-events:none; }

            @keyframes floatBg { 0%,100%{transform:translate(0,0) rotate(0deg)} 33%{transform:translate(30px,-30px) rotate(5deg)} 66%{transform:translate(-20px,20px) rotate(-5deg)} }
            @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
            @keyframes fadeIn   { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
            @keyframes spin     { to{transform:rotate(360deg)} }

            .container { width:100%; max-width:720px; margin:0 auto; animation:fadeInUp 0.8s cubic-bezier(0.16,1,0.3,1); position:relative; z-index:1; }

            /* Header */
            .header { text-align:center; margin-bottom:48px; }
            .logo-container { margin-bottom:32px; animation:fadeIn 0.6s ease-out; }
            .logo { width:96px; height:96px; margin:0 auto; border-radius:24px; display:flex; align-items:center; justify-content:center; overflow:hidden; box-shadow:var(--shadow-glow),var(--shadow-lg); background:var(--bg-secondary); border:2px solid var(--border); transition:all 0.4s cubic-bezier(0.16,1,0.3,1); text-decoration:none; }
            .logo:hover { transform:scale(1.05) translateY(-5px); border-color:var(--accent); }
            .logo img { width:100%; height:100%; object-fit:cover; }
            .back-link { display:inline-flex; align-items:center; gap:8px; color:var(--text-secondary); text-decoration:none; font-size:14px; margin-bottom:24px; transition:all 0.3s ease; font-weight:500; }
            .back-link:hover { color:var(--accent); gap:12px; }
            .back-arrow { transition:transform 0.3s ease; }
            .back-link:hover .back-arrow { transform:translateX(-4px); }
            h1 { font-size:48px; font-weight:700; letter-spacing:-0.03em; margin-bottom:12px; background:linear-gradient(135deg,var(--text-primary) 0%,var(--accent) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:fadeIn 0.6s ease-out 0.2s backwards; }
            .header-subtitle { font-size:16px; color:var(--text-secondary); animation:fadeIn 0.6s ease-out 0.3s backwards; }

            /* Form card */
            .form-card { background:var(--bg-secondary); border-radius:var(--radius-lg); padding:40px; box-shadow:var(--shadow-md); border:1px solid var(--border); animation:fadeIn 0.6s ease-out 0.3s backwards; position:relative; overflow:hidden; }
            .form-card::before { content:""; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--accent),var(--accent-hover)); }

            /* No events */
            .no-events-state { text-align:center; padding:48px 20px; }
            .no-events-icon { font-size:48px; margin-bottom:16px; }
            .no-events-title { font-size:20px; font-weight:600; color:var(--text-primary); margin-bottom:8px; }
            .no-events-sub { font-size:14px; color:var(--text-secondary); }

            /* Event selector */
            .section-label { display:block; font-size:13px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:12px; font-family:"JetBrains Mono",monospace; }
            .event-cards-grid { display:grid; gap:12px; margin-bottom:28px; }

            .event-option {
                display:flex; align-items:stretch; gap:0;
                border:1px solid var(--border); border-radius:var(--radius-md);
                cursor:pointer; transition:all 0.25s ease; overflow:hidden;
                background:var(--bg-primary);
            }
            .event-option:hover { border-color:var(--border-hover); }
            .event-option.selected { border-color:var(--accent); box-shadow:0 0 0 3px rgba(33,150,243,0.1); }

            /* Thumbnail */
            .event-option-thumb { width:72px; height:72px; flex-shrink:0; overflow:hidden; background:var(--bg-tertiary); display:flex; align-items:center; justify-content:center; font-size:28px; transition:all 0.3s ease; }
            .event-option-thumb img { width:100%; height:100%; object-fit:cover; transition:transform 0.4s ease; }
            .event-option:hover .event-option-thumb img { transform:scale(1.08); }
            .event-option.selected .event-option-thumb { background:rgba(33,150,243,0.1); }

            .event-option-body { flex:1; min-width:0; padding:12px 14px; display:flex; flex-direction:column; justify-content:center; gap:3px; }
            .event-option-name { font-size:15px; font-weight:600; color:var(--text-primary); letter-spacing:-0.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
            .event-option-desc { font-size:13px; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

            /* Schedule line on event option */
            .event-option-sched { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
            .sched-pill { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; font-family:"JetBrains Mono",monospace; white-space:nowrap; }
            .sched-pill.live     { background:rgba(76,175,80,0.12);  border:1px solid rgba(76,175,80,0.3);  color:var(--green); }
            .sched-pill.upcoming { background:rgba(255,152,0,0.12);  border:1px solid rgba(255,152,0,0.3);  color:var(--status-degraded); }
            .sched-date { font-size:11px; color:var(--text-tertiary); font-family:"JetBrains Mono",monospace; }

            .event-radio { width:18px; height:18px; border-radius:50%; border:2px solid var(--border-hover); flex-shrink:0; transition:all 0.2s ease; display:flex; align-items:center; justify-content:center; margin-right:14px; align-self:center; }
            .event-option.selected .event-radio { border-color:var(--accent); background:var(--accent); }
            .event-option.selected .event-radio::after { content:""; width:6px; height:6px; border-radius:50%; background:white; }

            /* Errors */
            .field-error-event { font-size:12px; color:var(--status-down); margin-top:-18px; margin-bottom:20px; display:none; }
            .field-error-event.visible { display:block; }

            /* Info note */
            .info-note { display:flex; gap:10px; background:rgba(33,150,243,0.06); border:1px solid rgba(33,150,243,0.15); border-radius:var(--radius-sm); padding:14px 16px; font-size:13px; color:var(--text-secondary); line-height:1.6; margin-bottom:28px; }
            .info-note-icon { flex-shrink:0; font-size:16px; }

            /* Fields */
            .field-group { margin-bottom:24px; }
            label { display:block; font-size:13px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:10px; font-family:"JetBrains Mono",monospace; }
            input[type="text"], textarea { width:100%; background:var(--bg-primary); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px 16px; color:var(--text-primary); font-size:15px; font-family:inherit; transition:all 0.3s ease; outline:none; resize:none; }
            input[type="text"]::placeholder, textarea::placeholder { color:rgba(100,181,246,0.35); }
            input[type="text"]:focus, textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(33,150,243,0.12); background:var(--bg-secondary); }
            input[type="text"]:hover, textarea:hover { border-color:var(--border-hover); }
            .username-wrapper { position:relative; }
            .username-avatar { position:absolute; right:12px; top:50%; transform:translateY(-50%); width:32px; height:32px; border-radius:6px; overflow:hidden; border:1px solid var(--border); display:none; background:var(--bg-tertiary); }
            .username-avatar img { width:100%; height:100%; object-fit:cover; }
            .username-avatar.visible { display:block; }
            textarea { min-height:130px; line-height:1.6; }
            .char-count { text-align:right; font-size:12px; color:var(--text-tertiary); font-family:"JetBrains Mono",monospace; margin-top:6px; transition:color 0.3s; }
            .char-count.warning { color:var(--status-degraded); }
            .char-count.over    { color:var(--status-down); }
            .field-error { font-size:12px; color:var(--status-down); margin-top:6px; display:none; }
            .field-error.visible { display:block; }
            input.error, textarea.error { border-color:rgba(244,67,54,0.5); box-shadow:0 0 0 3px rgba(244,67,54,0.1); }

            /* Submit */
            .submit-btn { width:100%; background:linear-gradient(135deg,var(--accent),var(--accent-hover)); color:white; border:none; padding:16px 24px; border-radius:var(--radius-md); font-size:15px; font-weight:600; cursor:pointer; transition:all 0.3s cubic-bezier(0.16,1,0.3,1); box-shadow:0 4px 16px rgba(33,150,243,0.3); display:flex; align-items:center; justify-content:center; gap:10px; }
            .submit-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 24px rgba(33,150,243,0.5); }
            .submit-btn:disabled { opacity:0.5; cursor:not-allowed; }
            .submit-btn.loading { pointer-events:none; opacity:0.8; }
            .spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; display:none; }
            .submit-btn.loading .spinner { display:block; }
            .submit-btn.loading .btn-text { opacity:0.7; }

            /* Toast */
            .toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(100px); background:var(--bg-tertiary); border:1px solid rgba(76,175,80,0.4); border-radius:var(--radius-md); padding:16px 24px; display:flex; align-items:center; gap:12px; font-size:14px; font-weight:500; color:var(--text-primary); box-shadow:var(--shadow-lg); z-index:100; transition:transform 0.5s cubic-bezier(0.16,1,0.3,1); white-space:nowrap; }
            .toast.show { transform:translateX(-50%) translateY(0); }
            .toast.error { border-color:rgba(244,67,54,0.4); }
            .toast-icon { font-size:20px; }

            /* Footer */
            .footer { text-align:center; margin-top:48px; padding-top:32px; border-top:1px solid var(--border); animation:fadeIn 0.6s ease-out 0.6s backwards; }
            .footer-text { font-size:14px; color:var(--text-tertiary); line-height:1.6; }
            .footer-text a { color:var(--accent); text-decoration:none; }
            .footer-text a:hover { color:var(--accent-hover); }

            /* Particles */
            .particles { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
            .particle { position:absolute; width:3px; height:3px; background:var(--accent); border-radius:50%; opacity:0; animation:float-particle 15s infinite; box-shadow:0 0 10px var(--accent); }
            @keyframes float-particle { 0%{transform:translateY(100vh) translateX(0);opacity:0} 10%{opacity:0.5} 90%{opacity:0.5} 100%{transform:translateY(-100px) translateX(100px);opacity:0} }
            .particle:nth-child(1){left:10%;animation-delay:0s}.particle:nth-child(2){left:25%;animation-delay:3s}.particle:nth-child(3){left:40%;animation-delay:6s}.particle:nth-child(4){left:60%;animation-delay:9s}.particle:nth-child(5){left:75%;animation-delay:12s}.particle:nth-child(6){left:90%;animation-delay:2s}

            @media(max-width:768px) { body{padding:32px 16px} h1{font-size:36px} .logo{width:80px;height:80px} .form-card{padding:24px} }
        </style>
    </head>
    <body>
        <div class="particles"><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div><div class="particle"></div></div>

        <div class="container">
            <div class="header">
                <div class="logo-container">
                    <a href="https://infinitysmp.github.io/" class="logo"><img src="https://infinitysmp.github.io/logo.png" alt="Infinity SMP" /></a>
                </div>
                <a href="https://infinitysmp.github.io/events/" class="back-link"><span class="back-arrow">←</span> Back to Events</a>
                <h1>Event Opt-Out</h1>
                <p class="header-subtitle">Not feeling this one? No worries — let us know below.</p>
            </div>

            <div class="form-card" id="formCard">
                <div style="text-align:center;padding:48px 0;">
                    <div style="width:32px;height:32px;border:3px solid rgba(33,150,243,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;"></div>
                    <div style="color:var(--text-secondary);font-size:14px;">Loading events...</div>
                </div>
            </div>

            <div class="footer">
                <p class="footer-text">Infinity SMP • Event Opt-Out<br />Changed your mind? Contact us on <a href="https://discord.gg/3FbYYN4cQS">Discord</a></p>
            </div>
        </div>

        <div class="toast" id="toast"><span class="toast-icon" id="toastIcon">✅</span><span id="toastMsg">Opt-out submitted!</span></div>

        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
            import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

            const firebaseConfig = { apiKey:"AIzaSyBgV9PoUFut3FPc0iChFNm2-h6-Uc5z6s0", authDomain:"infinity-service-b2f10.firebaseapp.com", databaseURL:"https://infinity-service-b2f10-default-rtdb.firebaseio.com", projectId:"infinity-service-b2f10", storageBucket:"infinity-service-b2f10.firebasestorage.app", messagingSenderId:"805770674259", appId:"1:805770674259:web:bcc520979e6772fda5c6a6" };
            const app = initializeApp(firebaseConfig);
            const db  = getDatabase(app);

            let activeEvents = [], selectedEventKey = null;

            function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }
            function isImg(s) { return s && (s.startsWith("http") || s.startsWith("/") || s.startsWith(".")); }

            function fmtSchedShort(iso) {
                if (!iso) return null;
                return new Date(iso).toLocaleString("en-AU",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
            }
            function schedStatus(startIso, endIso) {
                const now = Date.now();
                const start = startIso ? new Date(startIso).getTime() : null;
                const end   = endIso   ? new Date(endIso).getTime()   : null;
                if (start && now < start) return "upcoming";
                if (end   && now > end)   return "ended";
                if (start) return "live";
                return null;
            }

            onValue(ref(db,"events/list"), snap => {
                const data = snap.val();
                activeEvents = data
                    ? Object.entries(data).filter(([k,v]) => k !== "_placeholder" && v.active).map(([key,v]) => ({key,...v})).sort((a,b) => a.name.localeCompare(b.name))
                    : [];
                renderForm();
            });

            function renderForm() {
                const card = document.getElementById("formCard");
                if (!activeEvents.length) {
                    card.innerHTML = `<div class="no-events-state"><div class="no-events-icon">📭</div><div class="no-events-title">No active events right now</div><div class="no-events-sub">Check back later — no events are currently open for opt-outs.</div></div>`;
                    return;
                }

                const optionsHTML = activeEvents.map(ev => {
                    const thumbHTML = isImg(ev.icon)
                        ? `<img src="${esc(ev.icon)}" alt="${esc(ev.name)}" onerror="this.parentElement.textContent='🎯'" />`
                        : (ev.icon || "🎯");

                    const status = schedStatus(ev.startDate, ev.endDate);
                    let schedHTML = "";
                    if (status === "upcoming" && ev.startDate) {
                        schedHTML = `<div class="event-option-sched"><span class="sched-pill upcoming">⏳ Starts ${esc(fmtSchedShort(ev.startDate))}</span></div>`;
                    } else if (status === "live" && ev.endDate) {
                        schedHTML = `<div class="event-option-sched"><span class="sched-pill live">● Live</span><span class="sched-date">Ends ${esc(fmtSchedShort(ev.endDate))}</span></div>`;
                    } else if (ev.startDate) {
                        schedHTML = `<div class="event-option-sched"><span class="sched-pill live">● Live</span><span class="sched-date">Since ${esc(fmtSchedShort(ev.startDate))}</span></div>`;
                    }

                    return `
                        <div class="event-option" id="eo-${esc(ev.key)}" onclick="selectEvent('${esc(ev.key)}')">
                            <div class="event-option-thumb">${thumbHTML}</div>
                            <div class="event-option-body">
                                <div class="event-option-name">${esc(ev.name)}</div>
                                ${ev.description ? `<div class="event-option-desc">${esc(ev.description)}</div>` : ""}
                                ${schedHTML}
                            </div>
                            <div class="event-radio"></div>
                        </div>`;
                }).join("");

                card.innerHTML = `
                    <span class="section-label">Select an Event to Opt Out Of</span>
                    <div class="event-cards-grid">${optionsHTML}</div>
                    <div class="field-error-event" id="eventError">Please select an event.</div>
                    <div class="info-note"><span class="info-note-icon">ℹ️</span><span>Your opt-out will be reviewed by the admins. Submitting does <strong>not</strong> automatically guarantee you'll be excluded — an admin will confirm.</span></div>
                    <div class="field-group">
                        <label for="username">Minecraft Username</label>
                        <div class="username-wrapper">
                            <input type="text" id="username" placeholder="e.g. Steve" autocomplete="off" spellcheck="false" maxlength="16" />
                            <div class="username-avatar" id="avatarPreview"><img id="avatarImg" src="" alt="Avatar" /></div>
                        </div>
                        <div class="field-error" id="usernameError">Please enter your Minecraft username.</div>
                    </div>
                    <div class="field-group">
                        <label for="reason">Reason for Opting Out</label>
                        <textarea id="reason" placeholder="Let the admins know why you'd like to sit this one out..." maxlength="500"></textarea>
                        <div class="char-count" id="charCount">0 / 500</div>
                        <div class="field-error" id="reasonError">Please provide a reason.</div>
                    </div>
                    <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
                        <div class="spinner"></div><span class="btn-text">Submit Opt-Out Request</span>
                    </button>`;

                let avatarTimer;
                document.getElementById("username").addEventListener("input", () => {
                    clearTimeout(avatarTimer);
                    const val = document.getElementById("username").value.trim();
                    if (val.length >= 3) { avatarTimer = setTimeout(() => { document.getElementById("avatarImg").src = `https://mc-heads.net/avatar/${val}/32`; document.getElementById("avatarPreview").classList.add("visible"); }, 600); }
                    else document.getElementById("avatarPreview").classList.remove("visible");
                });
                document.getElementById("reason").addEventListener("input", () => {
                    const len = document.getElementById("reason").value.length;
                    const cc  = document.getElementById("charCount");
                    cc.textContent = `${len} / 500`;
                    cc.className = "char-count" + (len >= 500 ? " over" : len >= 400 ? " warning" : "");
                });

                if (selectedEventKey && activeEvents.find(e => e.key === selectedEventKey)) highlight(selectedEventKey);
                else selectedEventKey = null;
            }

            window.selectEvent = function(key) { selectedEventKey = key; highlight(key); document.getElementById("eventError")?.classList.remove("visible"); };
            function highlight(key) { activeEvents.forEach(ev => document.getElementById(`eo-${ev.key}`)?.classList.toggle("selected", ev.key === key)); }

            window.handleSubmit = async function() {
                const username = document.getElementById("username")?.value.trim() || "";
                const reason   = document.getElementById("reason")?.value.trim()   || "";
                let valid = true;
                ["username","reason"].forEach(id => { document.getElementById(id)?.classList.remove("error"); document.getElementById(`${id}Error`)?.classList.remove("visible"); });
                document.getElementById("eventError")?.classList.remove("visible");
                if (!selectedEventKey) { document.getElementById("eventError")?.classList.add("visible"); valid = false; }
                if (!username) { document.getElementById("username")?.classList.add("error"); document.getElementById("usernameError")?.classList.add("visible"); valid = false; }
                if (!reason)   { document.getElementById("reason")?.classList.add("error");   document.getElementById("reasonError")?.classList.add("visible");   valid = false; }
                if (!valid) return;

                const btn = document.getElementById("submitBtn");
                btn.classList.add("loading"); btn.disabled = true;
                try {
                    const event = activeEvents.find(e => e.key === selectedEventKey);
                    await push(ref(db,"events/optouts"), { username, reason, eventKey:selectedEventKey, event:event?.name||"Unknown Event", submittedAt:serverTimestamp() });
                    showToast("Opt-out submitted! Admins will review your request.");
                    document.getElementById("username").value = "";
                    document.getElementById("reason").value   = "";
                    document.getElementById("charCount").textContent = "0 / 500";
                    document.getElementById("avatarPreview")?.classList.remove("visible");
                    selectedEventKey = null; highlight(null);
                } catch(err) { console.error(err); showToast("Something went wrong. Please try again.", true); }
                finally { btn.classList.remove("loading"); btn.disabled = false; }
            };

            function showToast(msg, isError = false) {
                const t = document.getElementById("toast");
                document.getElementById("toastMsg").textContent  = msg;
                document.getElementById("toastIcon").textContent = isError ? "❌" : "✅";
                t.className = "toast" + (isError ? " error" : "") + " show";
                setTimeout(() => { t.className = "toast" + (isError ? " error" : ""); }, 4000);
            }
        </script>
    </body>
</html>
