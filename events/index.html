        <style>
            * { margin:0; padding:0; box-sizing:border-box; }
            html { overflow-x:hidden; overflow-y:auto; }
            body { overflow-x:hidden; }
            body::-webkit-scrollbar, html::-webkit-scrollbar { display:none; }
            body, html { -ms-overflow-style:none; scrollbar-width:none; }

            :root {
                --bg-primary: #0a1929; --bg-secondary: #0d2137; --bg-tertiary: #132f4c;
                --text-primary: #e3f2fd; --text-secondary: #90caf9; --text-tertiary: #64b5f6;
                --accent: #2196f3; --accent-hover: #42a5f5;
                --border: rgba(33,150,243,0.15); --border-hover: rgba(33,150,243,0.3);
                --shadow-md: 0 4px 20px rgba(33,150,243,0.15);
                --shadow-lg: 0 12px 48px rgba(33,150,243,0.25);
                --shadow-glow: 0 0 40px rgba(33,150,243,0.2);
                --radius-sm: 10px; --radius-md: 14px; --radius-lg: 20px;
                --green: #4caf50; --orange: #ff9800; --red: #f44336;
            }

            body { font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif; background:var(--bg-primary); color:var(--text-primary); min-height:100vh; padding:40px 20px; line-height:1.5; -webkit-font-smoothing:antialiased; position:relative; max-width:100vw; }
            body::before { content:""; position:fixed; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle at 30% 50%,rgba(33,150,243,0.1) 0%,transparent 50%),radial-gradient(circle at 70% 50%,rgba(33,150,243,0.05) 0%,transparent 50%); animation:floatBg 20s ease-in-out infinite; pointer-events:none; }

            @keyframes floatBg { 0%,100%{transform:translate(0,0) rotate(0deg)} 33%{transform:translate(30px,-30px) rotate(5deg)} 66%{transform:translate(-20px,20px) rotate(-5deg)} }
            @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
            @keyframes fadeIn   { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
            @keyframes spin     { to{transform:rotate(360deg)} }
            @keyframes pulse    { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.15);opacity:0.7} }

            .container { width:100%; max-width:1000px; margin:0 auto; animation:fadeInUp 0.8s cubic-bezier(0.16,1,0.3,1); position:relative; z-index:1; }

            /* Header */
            .header { text-align:center; margin-bottom:56px; }
            .logo-container { margin-bottom:32px; animation:fadeIn 0.6s ease-out; }
            .logo { width:96px; height:96px; margin:0 auto; border-radius:24px; display:flex; align-items:center; justify-content:center; overflow:hidden; box-shadow:var(--shadow-glow),var(--shadow-lg); background:var(--bg-secondary); border:2px solid var(--border); transition:all 0.4s cubic-bezier(0.16,1,0.3,1); text-decoration:none; }
            .logo:hover { transform:scale(1.05) translateY(-5px); box-shadow:0 0 60px rgba(33,150,243,0.4),var(--shadow-lg); border-color:var(--accent); }
            .logo img { width:100%; height:100%; object-fit:cover; }
            .back-link { display:inline-flex; align-items:center; gap:8px; color:var(--text-secondary); text-decoration:none; font-size:14px; margin-bottom:24px; transition:all 0.3s ease; font-weight:500; }
            .back-link:hover { color:var(--accent); gap:12px; }
            .back-arrow { transition:transform 0.3s ease; }
            .back-link:hover .back-arrow { transform:translateX(-4px); }
            h1 { font-size:48px; font-weight:700; letter-spacing:-0.03em; margin-bottom:14px; background:linear-gradient(135deg,var(--text-primary) 0%,var(--accent) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:fadeIn 0.6s ease-out 0.2s backwards; }
            .header-subtitle { font-size:17px; color:var(--text-secondary); animation:fadeIn 0.6s ease-out 0.3s backwards; max-width:560px; margin:0 auto; }

            .live-pill { display:inline-flex; align-items:center; gap:8px; padding:6px 16px; border-radius:20px; background:rgba(76,175,80,0.1); border:1px solid rgba(76,175,80,0.3); font-size:13px; font-weight:600; color:var(--green); font-family:"JetBrains Mono",monospace; margin-bottom:32px; animation:fadeIn 0.6s ease-out 0.35s backwards; }
            .live-dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 2s ease-in-out infinite; }

            /* Section headers */
            .section-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
            .section-title { font-size:13px; font-weight:600; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.08em; font-family:"JetBrains Mono",monospace; white-space:nowrap; }
            .section-line { flex:1; height:1px; background:var(--border); }
            .section-count { font-size:12px; color:var(--text-tertiary); font-family:"JetBrains Mono",monospace; }

            /* ── Active event cards ── */
            .events-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:28px; margin-bottom:56px; }

            .event-card {
                background:var(--bg-secondary); border-radius:var(--radius-lg); border:1px solid var(--border);
                box-shadow:var(--shadow-md); overflow:hidden; display:flex; flex-direction:column;
                transition:all 0.4s cubic-bezier(0.16,1,0.3,1);
                animation:fadeInUp 0.5s ease-out backwards;
            }
            .event-card:hover { transform:translateY(-6px); box-shadow:var(--shadow-lg),var(--shadow-glow); border-color:var(--border-hover); }

            /* Banner */
            .event-banner { width:100%; height:180px; overflow:hidden; position:relative; background:var(--bg-tertiary); display:flex; align-items:center; justify-content:center; }
            .event-banner img { width:100%; height:100%; object-fit:cover; transition:transform 0.5s cubic-bezier(0.16,1,0.3,1); }
            .event-card:hover .event-banner img { transform:scale(1.05); }
            .event-banner-emoji { font-size:72px; transition:transform 0.4s cubic-bezier(0.16,1,0.3,1); }
            .event-card:hover .event-banner-emoji { transform:scale(1.12) rotate(4deg); }

            /* Status + schedule overlay */
            .banner-overlay { position:absolute; top:12px; right:12px; display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
            .status-badge { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:20px; font-size:12px; font-weight:600; backdrop-filter:blur(8px); font-family:"JetBrains Mono",monospace; }
            .status-badge.active   { background:rgba(76,175,80,0.2);  border:1px solid rgba(76,175,80,0.4);  color:var(--green); }
            .status-badge.upcoming { background:rgba(255,152,0,0.2);  border:1px solid rgba(255,152,0,0.4);  color:var(--orange); }
            .status-badge.ended    { background:rgba(158,158,158,0.15); border:1px solid rgba(158,158,158,0.3); color:#9e9e9e; }
            .status-dot { width:6px; height:6px; border-radius:50%; }
            .status-badge.active   .status-dot { background:var(--green);  animation:pulse 2s ease-in-out infinite; }
            .status-badge.upcoming .status-dot { background:var(--orange); }
            .status-badge.ended    .status-dot { background:#9e9e9e; }

            /* Card body */
            .event-card-body { padding:24px; flex:1; display:flex; flex-direction:column; gap:12px; }
            .event-card-title { font-size:22px; font-weight:700; color:var(--text-primary); letter-spacing:-0.01em; }

            /* Schedule strip */
            .event-schedule { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
            .sched-item { display:inline-flex; align-items:center; gap:5px; font-size:13px; color:var(--text-secondary); font-family:"JetBrains Mono",monospace; }
            .sched-arrow { color:var(--text-tertiary); font-size:12px; }

            /* Countdown */
            .countdown { display:flex; gap:8px; flex-wrap:wrap; }
            .countdown-unit { background:var(--bg-tertiary); border:1px solid var(--border); border-radius:var(--radius-sm); padding:8px 12px; text-align:center; min-width:56px; }
            .countdown-num { font-size:22px; font-weight:700; color:var(--text-primary); font-family:"JetBrains Mono",monospace; display:block; }
            .countdown-label { font-size:10px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.08em; }

            /* Short description */
            .event-short-desc { font-size:14px; color:var(--text-secondary); line-height:1.65; }

            /* Long description toggle */
            .desc-toggle { display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--accent); cursor:pointer; border:none; background:none; font-family:inherit; padding:0; transition:color 0.2s; }
            .desc-toggle:hover { color:var(--accent-hover); }
            .desc-toggle-arrow { transition:transform 0.3s ease; display:inline-block; font-size:11px; }
            .desc-toggle.open .desc-toggle-arrow { transform:rotate(180deg); }

            .long-desc { display:none; margin-top:4px; }
            .long-desc.visible { display:block; animation:fadeIn 0.3s ease; }

            /* Rendered markdown inside cards */
            .long-desc h1 { font-size:20px; font-weight:700; color:var(--text-primary); margin:14px 0 6px; border-bottom:1px solid var(--border); padding-bottom:5px; }
            .long-desc h2 { font-size:17px; font-weight:600; color:var(--text-primary); margin:12px 0 5px; }
            .long-desc h3 { font-size:14px; font-weight:600; color:var(--text-secondary); margin:10px 0 4px; }
            .long-desc strong { color:var(--text-primary); font-weight:700; }
            .long-desc em { font-style:italic; }
            .long-desc ul, .long-desc ol { padding-left:20px; margin:6px 0; }
            .long-desc li { margin:3px 0; font-size:14px; color:var(--text-secondary); line-height:1.6; }
            .long-desc blockquote { border-left:3px solid var(--accent); padding:8px 14px; background:rgba(33,150,243,0.06); border-radius:0 6px 6px 0; margin:8px 0; color:var(--text-secondary); }
            .long-desc code { background:var(--bg-tertiary); padding:2px 6px; border-radius:4px; font-family:"JetBrains Mono",monospace; font-size:12px; color:var(--text-tertiary); }
            .long-desc hr { border:none; border-top:1px solid var(--border); margin:10px 0; }
            .long-desc p { margin:5px 0; font-size:14px; color:var(--text-secondary); line-height:1.65; }

            /* Footer action */
            .event-card-footer { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-top:auto; padding-top:4px; }
            .optout-btn { display:inline-flex; align-items:center; gap:7px; padding:10px 20px; border-radius:var(--radius-sm); background:linear-gradient(135deg,var(--accent),var(--accent-hover)); color:white; font-size:13px; font-weight:600; text-decoration:none; box-shadow:0 4px 12px rgba(33,150,243,0.3); transition:all 0.3s cubic-bezier(0.16,1,0.3,1); }
            .optout-btn:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(33,150,243,0.45); }
            .optout-btn.disabled { background:var(--bg-tertiary); border:1px solid var(--border); color:var(--text-tertiary); box-shadow:none; cursor:default; }
            .optout-btn.disabled:hover { transform:none; }

            /* Past events */
            .past-events-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; margin-bottom:56px; }
            .past-card { background:var(--bg-secondary); border:1px solid var(--border); border-radius:var(--radius-md); padding:18px 20px; display:flex; align-items:center; gap:14px; transition:all 0.3s ease; opacity:0.7; animation:fadeInUp 0.4s ease-out backwards; }
            .past-card:hover { border-color:var(--border-hover); opacity:1; box-shadow:var(--shadow-md); }
            .past-card-icon { width:44px; height:44px; border-radius:10px; overflow:hidden; flex-shrink:0; background:var(--bg-tertiary); display:flex; align-items:center; justify-content:center; font-size:22px; }
            .past-card-icon img { width:100%; height:100%; object-fit:cover; }
            .past-card-body { flex:1; min-width:0; }
            .past-card-name { font-size:15px; font-weight:600; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
            .past-card-meta { font-size:12px; color:var(--text-tertiary); font-family:"JetBrains Mono",monospace; margin-top:3px; }
            .past-pill { padding:3px 10px; border-radius:20px; flex-shrink:0; font-size:11px; font-weight:600; font-family:"JetBrains Mono",monospace; background:rgba(158,158,158,0.1); border:1px solid rgba(158,158,158,0.2); color:#9e9e9e; }

            /* Empty / loading */
            .empty-state { text-align:center; padding:80px 20px; background:var(--bg-secondary); border:1px solid var(--border); border-radius:var(--radius-lg); margin-bottom:48px; }
            .empty-icon { font-size:56px; margin-bottom:16px; }
            .empty-title { font-size:22px; font-weight:600; color:var(--text-primary); margin-bottom:8px; }
            .empty-sub { font-size:15px; color:var(--text-secondary); }
            .loading-wrap { text-align:center; padding:80px 20px; }
            .loading-spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
            .loading-text { color:var(--text-secondary); font-size:15px; }

            /* Footer */
            .footer { text-align:center; margin-top:40px; padding-top:32px; border-top:1px solid var(--border); animation:fadeIn 0.6s ease-out 0.6s backwards; }
            .footer-text { font-size:14px; color:var(--text-tertiary); line-height:1.6; }
            .footer-text a { color:var(--accent); text-decoration:none; }
            .footer-text a:hover { color:var(--accent-hover); }

            /* Particles */
            .particles { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
            .particle { position:absolute; width:3px; height:3px; background:var(--accent); border-radius:50%; opacity:0; animation:float-particle 15s infinite; box-shadow:0 0 10px var(--accent); }
            @keyframes float-particle { 0%{transform:translateY(100vh) translateX(0);opacity:0} 10%{opacity:0.5} 90%{opacity:0.5} 100%{transform:translateY(-100px) translateX(100px);opacity:0} }
            .particle:nth-child(1){left:10%;animation-delay:0s}.particle:nth-child(2){left:25%;animation-delay:3s}.particle:nth-child(3){left:40%;animation-delay:6s}.particle:nth-child(4){left:60%;animation-delay:9s}.particle:nth-child(5){left:75%;animation-delay:12s}.particle:nth-child(6){left:90%;animation-delay:2s}

            @media(max-width:768px) { body{padding:32px 16px} h1{font-size:36px} .logo{width:80px;height:80px} .events-grid{grid-template-columns:1fr} .past-events-grid{grid-template-columns:1fr} }
        </style>
    </head>
    <body>

        <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
            import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

            const firebaseConfig = { apiKey:"AIzaSyBgV9PoUFut3FPc0iChFNm2-h6-Uc5z6s0", authDomain:"infinity-service-b2f10.firebaseapp.com", databaseURL:"https://infinity-service-b2f10-default-rtdb.firebaseio.com", projectId:"infinity-service-b2f10", storageBucket:"infinity-service-b2f10.firebasestorage.app", messagingSenderId:"805770674259", appId:"1:805770674259:web:bcc520979e6772fda5c6a6" };
            const app = initializeApp(firebaseConfig);
            const db  = getDatabase(app);

            // ── Helpers ───────────────────────────────────────────
            function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }
            function isImg(s) { return s && (s.startsWith("http") || s.startsWith("/") || s.startsWith(".")); }

            function fmtDate(iso) {
                if (!iso) return null;
                return new Date(iso).toLocaleString("en-AU",{weekday:"short",day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
            }
            function fmtDateShort(iso) {
                if (!iso) return null;
                return new Date(iso).toLocaleDateString("en-AU",{day:"numeric",month:"short",year:"numeric"});
            }

            function schedStatus(startIso, endIso) {
                const now   = Date.now();
                const start = startIso ? new Date(startIso).getTime() : null;
                const end   = endIso   ? new Date(endIso).getTime()   : null;
                if (start && now < start) return "upcoming";
                if (end   && now > end)   return "ended";
                if (start) return "live";
                return "active"; // no schedule = just active
            }

            // ── Markdown renderer ─────────────────────────────────
            function renderMarkdown(raw) {
                if (!raw || !raw.trim()) return "";
                const lines = raw.split("\n");
                let html = "", inUl = false, inOl = false;
                for (let line of lines) {
                    if (inUl && !line.match(/^- /))   { html += "</ul>"; inUl = false; }
                    if (inOl && !line.match(/^\d+\. /)) { html += "</ol>"; inOl = false; }
                    if      (line.startsWith("### "))  html += `<h3>${inl(line.slice(4))}</h3>`;
                    else if (line.startsWith("## "))   html += `<h2>${inl(line.slice(3))}</h2>`;
                    else if (line.startsWith("# "))    html += `<h1>${inl(line.slice(2))}</h1>`;
                    else if (line.startsWith("> "))    html += `<blockquote>${inl(line.slice(2))}</blockquote>`;
                    else if (line.startsWith("---") || line.startsWith("***")) html += "<hr>";
                    else if (line.match(/^- /)) { if (!inUl) { html += "<ul>"; inUl = true; } html += `<li>${inl(line.slice(2))}</li>`; }
                    else if (line.match(/^\d+\. /)) { if (!inOl) { html += "<ol>"; inOl = true; } html += `<li>${inl(line.replace(/^\d+\. /,""))}</li>`; }
                    else if (line.trim() === "") html += "<br>";
                    else html += `<p>${inl(line)}</p>`;
                }
                if (inUl) html += "</ul>";
                if (inOl) html += "</ol>";
                return html;
            }
            function inl(s) {
                return esc(s)
                    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
                    .replace(/\*(.+?)\*/g,"<em>$1</em>")
                    .replace(/`(.+?)`/g,"<code>$1</code>");
            }

            // ── Countdown ─────────────────────────────────────────
            const countdownTimers = {};

            function startCountdown(key, targetIso, elId) {
                if (countdownTimers[key]) clearInterval(countdownTimers[key]);
                function tick() {
                    const el = document.getElementById(elId);
                    if (!el) { clearInterval(countdownTimers[key]); return; }
                    const diff = new Date(targetIso).getTime() - Date.now();
                    if (diff <= 0) { el.innerHTML = ""; clearInterval(countdownTimers[key]); return; }
                    const d = Math.floor(diff / 86400000);
                    const h = Math.floor((diff % 86400000) / 3600000);
                    const m = Math.floor((diff % 3600000) / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    el.innerHTML = [
                        d > 0 ? `<div class="countdown-unit"><span class="countdown-num">${d}</span><span class="countdown-label">Days</span></div>` : "",
                        `<div class="countdown-unit"><span class="countdown-num">${String(h).padStart(2,"0")}</span><span class="countdown-label">Hours</span></div>`,
                        `<div class="countdown-unit"><span class="countdown-num">${String(m).padStart(2,"0")}</span><span class="countdown-label">Mins</span></div>`,
                        `<div class="countdown-unit"><span class="countdown-num">${String(s).padStart(2,"0")}</span><span class="countdown-label">Secs</span></div>`,
                    ].join("");
                }
                tick();
                countdownTimers[key] = setInterval(tick, 1000);
            }

            // ── Toggle long description ───────────────────────────
            window.toggleLongDesc = function(key) {
                const desc = document.getElementById(`ld-${key}`);
                const btn  = document.getElementById(`ldbtn-${key}`);
                if (!desc || !btn) return;
                const open = desc.classList.toggle("visible");
                btn.classList.toggle("open", open);
                btn.querySelector(".desc-toggle-text").textContent = open ? "Hide details" : "Read more";
            };

            // ── Data listener ─────────────────────────────────────
            onValue(ref(db,"events/list"), snap => {
                const data = snap.val();
                const all  = data
                    ? Object.entries(data)
                        .filter(([k]) => k !== "_placeholder")
                        .map(([key,v]) => ({key,...v}))
                        .sort((a,b) => (b.createdAt||0)-(a.createdAt||0))
                    : [];
                renderActive(all.filter(e => e.active));
                renderPast(all.filter(e => !e.active));
            });

            function renderActive(events) {
                const section = document.getElementById("activeSection");
                if (!events.length) {
                    section.innerHTML = `
                        <div class="section-header">
                            <span class="section-title">Active Events</span>
                            <div class="section-line"></div>
                            <span class="section-count">0 events</span>
                        </div>
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <div class="empty-title">No active events right now</div>
                            <div class="empty-sub">Check back soon — the admins will post new events here!</div>
                        </div>`;
                    return;
                }

                const cards = events.map((ev, i) => {
                    const status = schedStatus(ev.startDate, ev.endDate);
                    const bannerHTML = isImg(ev.icon)
                        ? `<img src="${esc(ev.icon)}" alt="${esc(ev.name)}" onerror="this.parentElement.innerHTML='<span class=\\'event-banner-emoji\\'>🎯</span>'" />`
                        : `<span class="event-banner-emoji">${ev.icon || "🎯"}</span>`;

                    const statusLabel = status === "upcoming" ? "⏳ Upcoming" : status === "live" ? "● Live" : "● Active";
                    const statusBadge = `<span class="status-badge ${status === "upcoming" ? "upcoming" : "active"}"><span class="status-dot"></span>${statusLabel}</span>`;

                    // Schedule strip
                    let schedHTML = "";
                    if (ev.startDate || ev.endDate) {
                        schedHTML = `<div class="event-schedule">
                            ${ev.startDate ? `<span class="sched-item">🗓 ${esc(fmtDate(ev.startDate))}</span>` : ""}
                            ${ev.startDate && ev.endDate ? `<span class="sched-arrow">→</span>` : ""}
                            ${ev.endDate   ? `<span class="sched-item">${esc(fmtDate(ev.endDate))}</span>` : ""}
                        </div>`;
                    }

                    // Countdown — show if upcoming (counts to start) or live with end (counts to end)
                    let countdownHTML = "";
                    const countId = `cd-${ev.key}`;
                    if (status === "upcoming" && ev.startDate) {
                        countdownHTML = `<div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:6px;font-family:'JetBrains Mono',monospace">STARTS IN</div><div class="countdown" id="${countId}"></div></div>`;
                    } else if (status === "live" && ev.endDate) {
                        countdownHTML = `<div><div style="font-size:12px;color:var(--text-tertiary);margin-bottom:6px;font-family:'JetBrains Mono',monospace">ENDS IN</div><div class="countdown" id="${countId}"></div></div>`;
                    }

                    // Long description toggle
                    const longDesc = ev.longDescription ? renderMarkdown(ev.longDescription) : "";
                    const longDescHTML = longDesc ? `
                        <button class="desc-toggle" id="ldbtn-${esc(ev.key)}" onclick="toggleLongDesc('${esc(ev.key)}')">
                            <span class="desc-toggle-text">Read more</span>
                            <span class="desc-toggle-arrow">▼</span>
                        </button>
                        <div class="long-desc" id="ld-${esc(ev.key)}">${longDesc}</div>` : "";

                    // Opt-out button
                    const optoutBtn = ev.active
                        ? `<a href="https://infinitysmp.github.io/events/opt-out" class="optout-btn">✋ Opt Out →</a>`
                        : `<span class="optout-btn disabled">Opt-outs closed</span>`;

                    return `
                        <div class="event-card" style="animation-delay:${i*0.08}s">
                            <div class="event-banner">
                                ${bannerHTML}
                                <div class="banner-overlay">${statusBadge}</div>
                            </div>
                            <div class="event-card-body">
                                <div class="event-card-title">${esc(ev.name)}</div>
                                ${schedHTML}
                                ${countdownHTML}
                                ${ev.description ? `<div class="event-short-desc">${esc(ev.description)}</div>` : ""}
                                ${longDescHTML}
                                <div class="event-card-footer">
                                    <span style="font-size:12px;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace">
                                        ${ev.createdAt ? `📋 Added ${fmtDateShort(new Date(ev.createdAt).toISOString())}` : ""}
                                    </span>
                                    ${optoutBtn}
                                </div>
                            </div>
                        </div>`;
                }).join("");

                section.innerHTML = `
                    <div class="section-header">
                        <span class="section-title">Active Events</span>
                        <div class="section-line"></div>
                        <span class="section-count">${events.length} event${events.length !== 1 ? "s" : ""}</span>
                    </div>
                    <div class="events-grid">${cards}</div>`;

                // Start countdowns after DOM is ready
                events.forEach(ev => {
                    const status = schedStatus(ev.startDate, ev.endDate);
                    const countId = `cd-${ev.key}`;
                    if (status === "upcoming" && ev.startDate) startCountdown(ev.key, ev.startDate, countId);
                    else if (status === "live" && ev.endDate)  startCountdown(ev.key, ev.endDate,   countId);
                });
            }

            function renderPast(events) {
                const section = document.getElementById("pastSection");
                if (!events.length) { section.style.display = "none"; return; }
                section.style.display = "block";
                document.getElementById("pastCount").textContent = `${events.length} event${events.length !== 1 ? "s" : ""}`;
                document.getElementById("pastGrid").innerHTML = events.map((ev, i) => {
                    const iconHTML = isImg(ev.icon)
                        ? `<img src="${esc(ev.icon)}" alt="${esc(ev.name)}" onerror="this.parentElement.textContent='🎯'" />`
                        : (ev.icon || "🎯");
                    const meta = ev.endDate ? `Ended ${fmtDateShort(ev.endDate)}` : (ev.startDate ? `Started ${fmtDateShort(ev.startDate)}` : "");
                    return `
                        <div class="past-card" style="animation-delay:${i*0.05}s">
                            <div class="past-card-icon">${iconHTML}</div>
                            <div class="past-card-body">
                                <div class="past-card-name">${esc(ev.name)}</div>
                                ${meta ? `<div class="past-card-meta">${esc(meta)}</div>` : ""}
                            </div>
                            <span class="past-pill">Ended</span>
                        </div>`;
                }).join("");
            }
        </script>
    </body>
</html>
